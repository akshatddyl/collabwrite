spring.application.name=collabedit

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8080}

# JWT
jwt.secret=YTJiMzRjNWQ2ZTdmOGcxMGgxMWkxMmoxM2sxNGwxNW0xNm4xN28xOHAxOXEyMHIyMXMyMnQyM3UyNHYyNXcyNg==
jwt.expiration=86400000

# WebSocket
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536
